<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#b71c1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hillside FD">
  <link rel="manifest" href="/manifest.json">
  <title>Recall List — Hillside FD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .nav-active { border-bottom: 3px solid white; font-weight: 700; }
    select, button { min-height: 44px; }
    .tab-active { background: #b71c1c; color: white; }
    .tab-inactive { background: white; color: #374151; border: 1px solid #d1d5db; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Auth modal container -->
  <div id="authModal"></div>

  <!-- Nav -->
  <nav class="bg-red-800 text-white px-4 py-3 flex items-center justify-between shadow-lg sticky top-0 z-50">
    <span class="font-extrabold text-lg tracking-wide">🔥 HILLSIDE FD</span>
    <div class="flex items-center gap-3 text-sm">
      <a href="/sick" class="hover:text-red-200 pb-1">Sick</a>
      <a href="/recall" class="nav-active pb-1">Recall</a>
      <a href="/admin" class="hover:text-red-200 pb-1">Admin</a>
      <span id="authSlot" class="flex items-center gap-2 ml-2"></span>
    </div>
  </nav>

  <!-- Error Banner -->
  <div id="errorBanner" class="hidden bg-red-600 text-white text-sm px-4 py-3 text-center font-semibold"></div>

  <div class="max-w-5xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-extrabold text-gray-800 mb-4">Recall List</h1>

    <!-- Group Tabs -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <button id="tab-1" onclick="switchGroup(1)" class="tab-active font-semibold px-5 py-2 rounded-xl text-sm transition">Group 1</button>
      <button id="tab-2" onclick="switchGroup(2)" class="tab-inactive font-semibold px-5 py-2 rounded-xl text-sm transition">Group 2</button>
      <button id="tab-3" onclick="switchGroup(3)" class="tab-inactive font-semibold px-5 py-2 rounded-xl text-sm transition">Group 3</button>
      <button id="tab-4" onclick="switchGroup(4)" class="tab-inactive font-semibold px-5 py-2 rounded-xl text-sm transition">Group 4</button>
    </div>

    <div id="loadingMsg" class="text-gray-400 text-sm text-center py-12">Loading...</div>

    <!-- Record Recall Card -->
    <div id="recallForm" class="hidden bg-white rounded-2xl shadow p-5 mb-6">
      <h2 class="font-bold text-gray-800 text-base mb-3 uppercase tracking-wide">Record Recall</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <select id="recallPerson" class="border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500">
          <option value="">Select person...</option>
        </select>
        <select id="recallType" class="border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500" onchange="onRecallTypeChange()">
          <option value="">Recall type...</option>
          <option value="full_shift">Full Shift (7hrs+)</option>
          <option value="short_min">Short Minimum (4–7hrs)</option>
          <option value="refused">Refused</option>
          <option value="refused_no_penalty">Refused Without Penalty</option>
          <option value="vacation_skip">Vacation Skip</option>
        </select>
        <input id="recallHours" type="number" step="0.5" min="0" max="24"
          placeholder="Hours worked (optional)"
          class="border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500" style="min-height:44px">
        <input id="recallStartTime" type="text" maxlength="4" placeholder="Start time (e.g. 0730)"
          class="border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500" style="min-height:44px">
        <input id="recallEndTime" type="text" maxlength="4" placeholder="End time (e.g. 1730)"
          class="border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500" style="min-height:44px">
      </div>
      <!-- Sub section — shown only when Refused is selected -->
      <div id="subSection" class="hidden mt-3 pt-3 border-t border-gray-200">
        <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none mb-2">
          <input type="checkbox" id="subTookShift" onchange="toggleSubSection(this)" class="accent-red-700 w-4 h-4">
          Someone else took this shift
        </label>
        <select id="subPerson" class="hidden border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500">
          <option value="">Who substituted?...</option>
        </select>
      </div>
      <button onclick="recordRecall()" class="mt-3 bg-red-700 hover:bg-red-800 text-white font-bold rounded-xl px-6 py-3 w-full transition">
        Record Recall
      </button>
      <div id="recallResult" class="text-sm font-semibold text-center mt-2"></div>
    </div>

    <!-- Lists -->
    <div id="listsContainer" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <h2 class="font-bold text-gray-700 uppercase tracking-wide text-sm mb-3">FF List</h2>
        <div id="ffList"></div>
      </div>
      <div>
        <h2 class="font-bold text-gray-700 uppercase tracking-wide text-sm mb-3">Captain List</h2>
        <div id="captainList"></div>
      </div>
    </div>

    <!-- Recall Log -->
    <div id="recallLogSection" class="hidden mt-8">
      <h2 class="font-bold text-gray-700 uppercase tracking-wide text-sm mb-3">Recall Log</h2>
      <div id="recallLogList"></div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    const API = '/.netlify/functions'
    let currentGroup = 1
    let groupData = {}
    let allFirefighters = []

    function showError(msg) {
      const b = document.getElementById('errorBanner')
      b.textContent = msg
      b.classList.remove('hidden')
      setTimeout(() => b.classList.add('hidden'), 6000)
    }

    async function loadFirefighters() {
      const res = await fetch(`${API}/get-firefighters`)
      if (!res.ok) throw new Error('Failed to load firefighters')
      allFirefighters = await res.json()
    }

    async function loadGroup(n) {
      document.getElementById('loadingMsg').classList.remove('hidden')
      document.getElementById('recallForm').classList.add('hidden')
      document.getElementById('listsContainer').classList.add('hidden')
      document.getElementById('recallLogSection').classList.add('hidden')

      try {
        if (allFirefighters.length === 0) await loadFirefighters()
        const res = await fetch(`${API}/get-recall-list?group=${n}`)
        if (!res.ok) throw new Error('Failed to load recall list')
        const data = await res.json()
        groupData[n] = data
        renderGroup(n)
      } catch (e) {
        showError('Error loading group: ' + e.message)
        document.getElementById('loadingMsg').textContent = 'Failed to load. Tap a group tab to retry.'
      }
    }

    function renderGroup(n) {
      const data = groupData[n]
      if (!data) return

      document.getElementById('loadingMsg').classList.add('hidden')
      document.getElementById('recallForm').classList.remove('hidden')
      document.getElementById('listsContainer').classList.remove('hidden')

      const ffEntries  = data.ff || []
      const capEntries = data.captains || []

      // Populate person dropdowns
      let personHtml = '<option value="">Select person...</option>'
      if (ffEntries.length) {
        personHtml += '<optgroup label="Firefighters">'
        for (const e of ffEntries) {
          const ff = e.firefighters || {}
          const sl = getSickLabel(e)
          personHtml += `<option value="${e.id}" ${sl ? 'style="color:#9ca3af"' : ''}>Pos ${e.list_position} — ${ff.name}${sl ? ` (${sl})` : ''}</option>`
        }
        personHtml += '</optgroup>'
      }
      if (capEntries.length) {
        personHtml += '<optgroup label="Captains">'
        for (const e of capEntries) {
          const ff = e.firefighters || {}
          const sl = getSickLabel(e)
          personHtml += `<option value="${e.id}" ${sl ? 'style="color:#9ca3af"' : ''}>Pos ${e.list_position} — ${ff.name}${sl ? ` (${sl})` : ''}</option>`
        }
        personHtml += '</optgroup>'
      }
      document.getElementById('recallPerson').innerHTML = personHtml

      let subHtml = '<option value="">Who substituted?...</option>'
      if (ffEntries.length) {
        subHtml += '<optgroup label="Firefighters">'
        for (const e of ffEntries) { const ff = e.firefighters || {}; subHtml += `<option value="${e.id}">Pos ${e.list_position} — ${ff.name}</option>` }
        subHtml += '</optgroup>'
      }
      if (capEntries.length) {
        subHtml += '<optgroup label="Captains">'
        for (const e of capEntries) { const ff = e.firefighters || {}; subHtml += `<option value="${e.id}">Pos ${e.list_position} — ${ff.name}</option>` }
        subHtml += '</optgroup>'
      }
      document.getElementById('subPerson').innerHTML = subHtml

      renderPersonList(ffEntries, 'ffList')
      renderPersonList(capEntries, 'captainList')
      renderLog(data.log || [])
    }

    function getSickLabel(entry) {
      if (!entry.sick_status) return null
      if (entry.sick_status.currently_sick) return 'SICK'
      if (entry.sick_status.awaiting_confirm) return 'RTD PENDING'
      return null
    }

    function getBgClass(entry) {
      if (entry.sick_status) return 'bg-gray-200'
      return entry.short_min_count >= 1 ? 'bg-yellow-100' : 'bg-green-100'
    }

    function renderPersonList(entries, containerId) {
      const container = document.getElementById(containerId)
      if (entries.length === 0) {
        container.innerHTML = '<div class="text-gray-400 text-sm text-center py-6 bg-white rounded-xl border border-gray-200">No entries</div>'
        return
      }

      container.innerHTML = entries.map(e => {
        const ff = e.firefighters || {}
        const bg = getBgClass(e)
        const sickLabel = getSickLabel(e)

        let badge = ''
        let confirmPanel = ''

        if (sickLabel === 'SICK') {
          badge = `<span class="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded shrink-0">SICK</span>`
        } else if (sickLabel === 'RTD PENDING') {
          badge = `<span class="bg-orange-400 text-white text-xs font-bold px-2 py-0.5 rounded shrink-0">RTD PENDING</span>`
          const sickLogId = e.sick_status.sick_log_id || ''
          confirmPanel = `
            <div class="mt-2 pt-2 border-t border-gray-300 w-full">
              <p class="text-xs text-gray-500 mb-2">Cleared from sick — confirm they worked their 24hr shift to restore eligibility.</p>
              <button onclick="submitConfirm24hr(this)" data-sick-log-id="${sickLogId}"
                class="w-full bg-red-700 hover:bg-red-800 text-white text-xs font-bold rounded-lg px-3 py-2" style="min-height:36px">
                Confirm 24hr Shift
              </button>
              <div class="confirm-24hr-result text-xs font-semibold mt-1"></div>
            </div>`
        } else if (e.short_min_count >= 1) {
          badge = `<span class="text-yellow-700 text-xs font-semibold">⚠ Short min pending</span>`
        }

        const subNoteBadge = e.sub_note
          ? `<span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-0.5 rounded shrink-0">${e.sub_note}</span>`
          : ''

        return `
          <div class="px-4 py-3 rounded-xl mb-2 ${bg}">
            <div class="flex items-center gap-3">
              <span class="w-8 h-8 rounded-full bg-white bg-opacity-70 flex items-center justify-center text-sm font-bold text-gray-700 shrink-0">${e.list_position}</span>
              <span class="flex-1 font-semibold text-gray-800">${ff.name || '—'}</span>
              ${subNoteBadge}
              ${badge}
            </div>
            ${confirmPanel}
          </div>
        `
      }).join('')
    }

    const recallTypeLabels = {
      full_shift:          'Full Shift',
      short_min:           'Short Min',
      refused:             'Refused',
      refused_no_penalty:  'No Penalty',
      vacation_skip:       'Vac Skip',
      substitution:        'Sub'
    }

    function renderLog(entries) {
      const section   = document.getElementById('recallLogSection')
      const container = document.getElementById('recallLogList')
      section.classList.remove('hidden')

      if (entries.length === 0) {
        container.innerHTML = '<div class="text-gray-400 text-sm text-center py-6 bg-white rounded-xl border border-gray-200">No recalls recorded yet</div>'
        return
      }

      container.innerHTML = `
        <div class="bg-white rounded-2xl shadow overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-200 text-xs text-gray-500 uppercase tracking-wide">
                <th class="px-4 py-2 text-left">Date</th>
                <th class="px-4 py-2 text-left">Name</th>
                <th class="px-4 py-2 text-left">Type</th>
                <th class="px-4 py-2 text-left hidden sm:table-cell">Time</th>
                <th class="px-4 py-2 text-left hidden sm:table-cell">Hrs</th>
                <th class="px-4 py-2 text-left hidden sm:table-cell">By</th>
              </tr>
            </thead>
            <tbody>
              ${entries.map((e, i) => {
                const ff = e.firefighters || {}
                const date = e.shift_date
                  ? new Date(e.shift_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                  : '—'
                const typeLabel = recallTypeLabels[e.recall_type] || e.recall_type
                const typeBg = {
                  full_shift:         'bg-green-100 text-green-800',
                  short_min:          'bg-yellow-100 text-yellow-800',
                  refused:            'bg-red-100 text-red-700',
                  refused_no_penalty: 'bg-orange-100 text-orange-700',
                  vacation_skip:      'bg-gray-100 text-gray-600',
                  substitution:       'bg-blue-100 text-blue-700'
                }[e.recall_type] || 'bg-gray-100 text-gray-600'
                const timeStr = (e.recall_start_time || e.recall_end_time)
                  ? `${e.recall_start_time || '?'}–${e.recall_end_time || '?'}` : '—'
                const rowBg = i % 2 === 0 ? '' : 'bg-gray-50'
                return `
                  <tr class="${rowBg} border-b border-gray-100 last:border-0">
                    <td class="px-4 py-2 text-gray-600 whitespace-nowrap">${date}</td>
                    <td class="px-4 py-2 font-semibold text-gray-800">${ff.name || '—'}</td>
                    <td class="px-4 py-2"><span class="text-xs font-semibold px-2 py-0.5 rounded ${typeBg}">${typeLabel}</span></td>
                    <td class="px-4 py-2 text-gray-500 hidden sm:table-cell">${timeStr}</td>
                    <td class="px-4 py-2 text-gray-500 hidden sm:table-cell">${e.hours_worked != null ? e.hours_worked : '—'}</td>
                    <td class="px-4 py-2 text-gray-500 hidden sm:table-cell">${e.recorded_by || '—'}</td>
                  </tr>`
              }).join('')}
            </tbody>
          </table>
        </div>
      `
    }

    async function submitConfirm24hr(btn) {
      if (!AUTH.isOfficer()) {
        AUTH.showLoginModal(() => btn.click())
        return
      }
      const wrap = btn.closest('div')
      const sickLogId = btn.dataset.sickLogId
      const resultEl = wrap.querySelector('.confirm-24hr-result')

      btn.disabled = true
      if (resultEl) { resultEl.textContent = 'Saving...'; resultEl.className = 'text-xs font-semibold text-gray-500' }

      try {
        const res = await fetch(`${API}/confirm-24hr`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
          body: JSON.stringify({ sick_log_id: sickLogId })
        })
        if (!res.ok) {
          const d = await res.json()
          if (resultEl) { resultEl.textContent = d.error || 'Error.'; resultEl.className = 'text-xs font-semibold text-red-600' }
          btn.disabled = false
          return
        }
        if (resultEl) { resultEl.textContent = 'Confirmed — reloading...'; resultEl.className = 'text-xs font-semibold text-green-600' }
        delete groupData[currentGroup]
        loadGroup(currentGroup)
      } catch (e) {
        if (resultEl) { resultEl.textContent = 'Network error: ' + e.message; resultEl.className = 'text-xs font-semibold text-red-600' }
        btn.disabled = false
      }
    }

    function onRecallTypeChange() {
      const type = document.getElementById('recallType').value
      const subSection = document.getElementById('subSection')
      const subTookShift = document.getElementById('subTookShift')
      const subPerson = document.getElementById('subPerson')
      if (type === 'refused') {
        subSection.classList.remove('hidden')
      } else {
        subSection.classList.add('hidden')
        subTookShift.checked = false
        subPerson.classList.add('hidden')
        subPerson.value = ''
      }
    }

    function toggleSubSection(checkbox) {
      const subPerson = document.getElementById('subPerson')
      if (checkbox.checked) subPerson.classList.remove('hidden')
      else { subPerson.classList.add('hidden'); subPerson.value = '' }
    }

    async function recordRecall() {
      const recallListId  = document.getElementById('recallPerson').value
      const recallType    = document.getElementById('recallType').value
      const hoursWorked   = document.getElementById('recallHours').value
      const startTime     = document.getElementById('recallStartTime').value.trim()
      const endTime       = document.getElementById('recallEndTime').value.trim()
      const subTookShift  = document.getElementById('subTookShift').checked
      const subPersonId   = document.getElementById('subPerson').value
      const resultEl      = document.getElementById('recallResult')

      if (!recallListId) { resultEl.textContent = 'Please select a person.'; resultEl.className = 'text-sm font-semibold text-center text-orange-600'; return }
      if (!recallType)   { resultEl.textContent = 'Please select a recall type.'; resultEl.className = 'text-sm font-semibold text-center text-orange-600'; return }
      if (recallType === 'refused' && subTookShift && !subPersonId) { resultEl.textContent = 'Please select who substituted.'; resultEl.className = 'text-sm font-semibold text-center text-orange-600'; return }
      if (recallType === 'refused' && subTookShift && subPersonId === recallListId) { resultEl.textContent = 'Substitute cannot be the same person who refused.'; resultEl.className = 'text-sm font-semibold text-center text-orange-600'; return }

      if (!AUTH.isOfficer()) {
        AUTH.showLoginModal(() => recordRecall())
        return
      }

      resultEl.textContent = 'Saving...'
      resultEl.className = 'text-sm font-semibold text-center text-gray-500'

      try {
        const payload = {
          recall_list_id: recallListId,
          recall_type: recallType,
          hours_worked: hoursWorked ? parseFloat(hoursWorked) : null,
          shift_date: new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' }),
          recall_start_time: startTime || null,
          recall_end_time: endTime || null
        }
        if (recallType === 'refused' && subTookShift && subPersonId) payload.sub_recall_list_id = subPersonId

        const res = await fetch(`${API}/record-recall`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
          body: JSON.stringify(payload)
        })
        const data = await res.json()
        if (!res.ok) {
          resultEl.textContent = data.error || 'Error recording recall.'
          resultEl.className = 'text-sm font-semibold text-center text-red-600'
          return
        }

        resultEl.textContent = 'Recall recorded successfully.'
        resultEl.className = 'text-sm font-semibold text-center text-green-600'

        document.getElementById('recallPerson').value = ''
        document.getElementById('recallType').value = ''
        document.getElementById('recallHours').value = ''
        document.getElementById('recallStartTime').value = ''
        document.getElementById('recallEndTime').value = ''
        document.getElementById('subSection').classList.add('hidden')
        document.getElementById('subTookShift').checked = false
        document.getElementById('subPerson').value = ''
        document.getElementById('subPerson').classList.add('hidden')

        groupData[currentGroup] = data
        renderGroup(currentGroup)
      } catch (e) {
        resultEl.textContent = 'Network error: ' + e.message
        resultEl.className = 'text-sm font-semibold text-center text-red-600'
      }
    }

    function switchGroup(n) {
      currentGroup = n
      for (let i = 1; i <= 4; i++) {
        document.getElementById(`tab-${i}`).className = i === n
          ? 'tab-active font-semibold px-5 py-2 rounded-xl text-sm transition'
          : 'tab-inactive font-semibold px-5 py-2 rounded-xl text-sm transition'
      }
      delete groupData[n]
      loadGroup(n)
    }

    loadGroup(1)

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(console.error))
    }
  </script>
</body>
</html>
