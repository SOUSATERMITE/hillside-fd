<!-- Status Update Modal -->
<div id="statusModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-start justify-center pt-8 px-4 overflow-y-auto">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 my-4">
    <h2 class="font-bold text-gray-800 text-lg mb-4" id="statusModalTitle">Update Status</h2>
    <div class="mb-3">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Status</label>
      <select id="ms_status" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
        <option value="in_service">In Service</option>
        <option value="out_of_service">Out of Service</option>
        <option value="maintenance">At Shop / Maintenance</option>
        <option value="reserve">Reserve In Service</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Location</label>
      <input id="ms_location" type="text" placeholder="e.g. Station 1, Township Garage, Mutual Aid" maxlength="200"
        class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600" style="min-height:40px;">
    </div>
    <div class="mb-3">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Notes</label>
      <textarea id="ms_notes" rows="2" maxlength="500"
        class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600" style="min-height:60px;resize:vertical;"></textarea>
    </div>
    <div id="ms_err" class="hidden text-red-600 text-xs mb-2"></div>
    <div class="flex gap-3">
      <button onclick="closeModal('statusModal')" class="flex-1 bg-gray-200 text-gray-700 font-bold rounded-xl py-3 transition hover:bg-gray-300">Cancel</button>
      <button onclick="submitStatusUpdate()" class="flex-1 bg-green-700 hover:bg-green-800 text-white font-bold rounded-xl py-3 transition">Update</button>
    </div>
  </div>
</div>

<!-- Finding/Damage Modal -->

        <option value="repair_needed">Repair Needed</option>

    </div>
    <div class="mb-3">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Priority</label>
      <select id="fm_priority" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>

    </div>
    <div class="mb-3">

<script src="/auth.js"></script>
<script>
const API = '/.netlify/functions'

// ── SHIFT CALCULATOR ─────────────────────────────────────────────────────────
const SHIFT_ANCHOR_MS = new Date('2026-04-30T11:30:00Z').getTime()
const ROTATION = [3, 4, 1, 2]
function getShiftStartMs(ms) {
  const shifts = Math.floor((ms - SHIFT_ANCHOR_MS) / 86400000)
  return SHIFT_ANCHOR_MS + shifts * 86400000
}
function groupForDate(ms) {
  const shifts = Math.floor((ms - SHIFT_ANCHOR_MS) / 86400000)
  return ROTATION[((shifts % 4) + 4) % 4]
}

// ── CHECK ITEM DEFINITIONS ───────────────────────────────────────────────────
const DAILY_COMMON = [
  { key:'fuel_level',    label:'Fuel Level',                    options:['Full','3/4','Half','Low'],      pass:['Full','3/4'] },
  { key:'oil_level',     label:'Oil Level',                     options:['Good','Low','Add'],              pass:['Good'] },
  { key:'coolant_level', label:'Coolant Level',                 options:['Good','Low'],                   pass:['Good'] },
  { key:'battery',       label:'Battery',                       options:['Good','Weak','Dead'],            pass:['Good'] },
  { key:'tires',         label:'Tires',                         options:['Good','Issue'],                  pass:['Good'] },
  { key:'lights',        label:'Lights (Headlights/Warning)',   options:['All Good','Issue'],              pass:['All Good'] },
  { key:'wipers',        label:'Wipers',                        options:['Good','Issue'],                  pass:['Good'] },
  { key:'cab_equipment', label:'Cab Equipment In Place',        options:['Good','Missing items'],          pass:['Good'] },
  { key:'radio',         label:'Radio Operational',             options:['Good','Issue'],                  pass:['Good'] },
]
const DAILY_ENGINE = [
  { key:'pump',       label:'Pump Operational',   options:['Good','Issue'],              pass:['Good'] },
  { key:'water_tank', label:'Water Tank Level',   options:['Full','3/4','Half','Low'],   pass:['Full','3/4'] },
  { key:'hose_load',  label:'Hose Load Intact',   options:['Good','Issue'],              pass:['Good'] },
]
const DAILY_TOWER = [
  { key:'aerial',       label:'Aerial Operational', options:['Good','Issue'], pass:['Good'] },
  { key:'stabilizers',  label:'Stabilizers',         options:['Good','Issue'], pass:['Good'] },
]
const DAILY_RESCUE = [
  { key:'generator', label:'Generator Operational', options:['Good','Issue'], pass:['Good'] },
  { key:'inverter',  label:'Inverter',               options:['Good','Issue'], pass:['Good'] },
]
const WEEKLY_ITEMS = [
  { key:'scba_bottles',    label:'SCBA Bottles (qty/pressure)',  options:['Good','Issue'], pass:['Good'] },
  { key:'scba_masks',      label:'SCBA Masks (condition)',        options:['Good','Issue'], pass:['Good'] },
  { key:'hand_tools',      label:'Hand Tools (present/condition)',options:['Good','Issue'], pass:['Good'] },
  { key:'power_tools',     label:'Power Tools Operational',       options:['Good','Issue'], pass:['Good'] },
  { key:'medical_bag',     label:'Medical Bag Stocked',           options:['Good','Issue'], pass:['Good'] },
  { key:'hose',            label:'Hose (qty/condition)',          options:['Good','Issue'], pass:['Good'] },
  { key:'nozzles',         label:'Nozzles Present',               options:['Good','Issue'], pass:['Good'] },
  { key:'ladders',         label:'Ladders Secure/Condition',      options:['Good','Issue'], pass:['Good'] },
  { key:'rope_bags',       label:'Rope Bags Present',             options:['Good','Issue'], pass:['Good'] },
  { key:'thermal_camera',  label:'Thermal Imaging Camera',        options:['Good','Issue'], pass:['Good'] },
  { key:'forcible_entry',  label:'Forcible Entry Tools',          options:['Good','Issue'], pass:['Good'] },
]

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function timeAgo(iso) {
  if (!iso) return 'never'
  const s = Math.floor((Date.now() - new Date(iso)) / 1000)
  if (s < 60)    return 'just now'
  if (s < 3600)  return `${Math.floor(s/60)}m ago`
  if (s < 86400) return `${Math.floor(s/3600)}h ago`
  return `${Math.floor(s/86400)}d ago`
}

function fmtDate(iso) {
  if (!iso) return '—'
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
}

function fmtDateTime(iso) {
  if (!iso) return '—'
  return new Date(iso).toLocaleString('en-US', { timeZone:'America/New_York', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true })
}

const STATUS_CFG = {
  in_service:     { label:'In Service',           cls:'bg-green-100 text-green-800',   dot:'bg-green-500',   border:'border-green-200',  bg:'' },
  out_of_service: { label:'Out of Service',        cls:'bg-red-100 text-red-800',       dot:'bg-red-500',     border:'border-red-400',    bg:'bg-red-50' },
  maintenance:    { label:'At Shop / Maintenance', cls:'bg-orange-100 text-orange-800', dot:'bg-orange-500',  border:'border-orange-300', bg:'bg-orange-50' },
  reserve:        { label:'Reserve In Service',    cls:'bg-yellow-100 text-yellow-800', dot:'bg-yellow-500',  border:'border-yellow-300', bg:'' }
}

const PRI_CFG = {
  critical:{ label:'CRITICAL', cls:'pri-critical' },
  high:    { label:'High',     cls:'pri-high' },
  medium:  { label:'Medium',   cls:'pri-medium' },
  low:     { label:'Low',      cls:'pri-low' }
}

const FTYPE_LABEL = {
  damage:'Damage', repair_needed:'Repair Needed', inspection:'Inspection',
  scheduled_maintenance:'Scheduled Maint.', repair_completed:'Repair Completed',
  daily_check:'Daily Check', weekly_check:'Weekly Check'
}

let apparatusData = []
let expandedId    = null
let activeTab     = {}   // apparatusId → tab
let modalUnitId   = null

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadApparatus() {
  try {
    const res = await fetch(`${API}/get-apparatus`)
    if (!res.ok) throw new Error('Failed to load')
    apparatusData = await res.json()
    renderAll()
  } catch (e) {
    document.getElementById('apparatusGrid').innerHTML =
      `<div class="text-center py-10 text-red-600 text-sm font-semibold">Failed to load apparatus data.</div>`
  }
}

function renderAll() {
  const banner = document.getElementById('oosBanner')
  const grid   = document.getElementById('apparatusGrid')
  const isOff  = AUTH.isOfficer()

  const oos  = apparatusData.filter(u => u.status === 'out_of_service')
  const rest = apparatusData.filter(u => u.status !== 'out_of_service')
  const sorted = [...oos, ...rest]

  if (oos.length) {
    banner.classList.remove('hidden')
    banner.textContent = `⚠ OUT OF SERVICE: ${oos.map(u => u.unit_name).join(', ')} — Notify D/C immediately`
  } else {
    banner.classList.add('hidden')
  }

  grid.innerHTML = sorted.map(u => renderCard(u, isOff)).join('')
}

function renderCard(u, isOff) {
  const st       = STATUS_CFG[u.status] || STATUS_CFG.in_service
  const isExp    = expandedId === u.id
  const tab      = activeTab[u.id] || 'status'
  const findings = u.findings || []
  const openFindings = findings.filter(f => ['open','in_progress'].includes(f.status) && ['damage','repair_needed','inspection'].includes(f.finding_type))
  const critHigh = openFindings.filter(f => ['critical','high'].includes(f.priority)).length

  const findBadge = openFindings.length
    ? `<span class="inline-flex items-center gap-1 text-xs font-bold px-2 py-0.5 rounded-full ${critHigh ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'} ml-1">
        ${critHigh ? '⚠' : '!'} ${openFindings.length} finding${openFindings.length > 1 ? 's' : ''}
       </span>`
    : ''

  const lastDailyCheck = (u.findings || []).find(f => f.finding_type === 'daily_check')
  const shiftStart = getShiftStartMs(Date.now())
  const checkDoneThisShift = lastDailyCheck && new Date(lastDailyCheck.created_at).getTime() >= shiftStart
  const dailyCheckBadge = checkDoneThisShift
    ? `<span class="inline-flex items-center gap-1 text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 ml-1">✓ Checked</span>`
    : `<span class="inline-flex items-center gap-1 text-xs font-bold px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700 ml-1">⚠ No daily check</span>`

  const headerBg = u.status === 'out_of_service' ? 'bg-red-50' : u.status === 'maintenance' ? 'bg-orange-50' : 'bg-white'

  return `<div class="bg-white rounded-2xl border-2 ${st.border} shadow-sm overflow-hidden">
    <!-- Card Header (always visible) -->
    <button onclick="toggleExpand('${u.id}')" class="w-full text-left ${headerBg} px-4 py-3 flex items-center justify-between gap-2 hover:bg-opacity-80 transition" style="min-height:0;">
      <div class="flex items-center gap-3 min-w-0">
        <span class="w-3 h-3 rounded-full flex-shrink-0 ${st.dot}"></span>
        <div class="min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-extrabold text-gray-900 text-base">${esc(u.unit_name)}</span>
            <span class="text-xs text-gray-500">${esc(u.unit_type)}</span>
            <span class="text-xs font-bold px-2 py-0.5 rounded-full ${st.cls}">${st.label}</span>
            ${findBadge}${dailyCheckBadge}
          </div>
          <div class="text-xs text-gray-500 mt-0.5">${esc(u.location || '—')} · Updated ${timeAgo(u.last_updated)}${u.updated_by ? ` by ${esc(u.updated_by)}` : ''}</div>
        </div>
      </div>
      <span class="text-gray-400 text-lg flex-shrink-0">${isExp ? '▲' : '▼'}</span>
    </button>

    <!-- Expanded content -->
    ${isExp ? renderExpanded(u, tab, isOff) : ''}
  </div>`
}

function renderExpanded(u, tab, isOff) {
  const findings = u.findings || []

  const tabBtn = (id, label, badge) => {
    const active = tab === id
    const b = badge ? `<span class="ml-1 text-xs font-bold px-1.5 py-0.5 rounded-full bg-red-100 text-red-700">${badge}</span>` : ''
    return `<button onclick="setTab('${u.id}','${id}')" class="px-3 py-2.5 text-sm ${active ? 'tab-active' : 'tab-inactive'} hover:text-gray-800 transition whitespace-nowrap" style="min-height:0;">${label}${b}</button>`
  }

  const openFindings = findings.filter(f => ['open','in_progress'].includes(f.status) && ['damage','repair_needed','inspection'].includes(f.finding_type))
  const repairs      = findings.filter(f => f.finding_type === 'repair_completed')
  const scheduled    = findings.filter(f => f.finding_type === 'scheduled_maintenance' && ['open','in_progress'].includes(f.status))
  const critHigh     = openFindings.filter(f => ['critical','high'].includes(f.priority)).length

  let content = ''
  if (tab === 'status') {
    content = renderStatusTab(u, isOff)
  } else if (tab === 'findings') {
    content = renderFindingsTab(u, openFindings, isOff)
  } else if (tab === 'repairs') {
    content = renderRepairsTab(u, repairs, isOff)
  } else if (tab === 'scheduled') {
    content = renderScheduledTab(u, scheduled, isOff)
  } else if (tab === 'checks') {
    content = renderChecksTab(u, isOff)
  }

  return `<div class="border-t border-gray-200">
    <div class="flex border-b border-gray-200 overflow-x-auto bg-gray-50 px-2">
      ${tabBtn('status',   'Status',    '')}
      ${tabBtn('findings', 'Findings',  critHigh || '')}
      ${tabBtn('repairs',  'Repairs',   '')}
      ${tabBtn('scheduled','Scheduled', '')}
      ${tabBtn('checks',   'Checks',    '')}
    </div>
    <div class="p-4">${content}</div>
  </div>`
}

function renderStatusTab(u, isOff) {
  const st = STATUS_CFG[u.status] || STATUS_CFG.in_service
  const log = (u.log || []).slice(0, 15)

  const updateForm = isOff ? `
    <div class="border border-gray-200 rounded-xl p-3 mb-4 bg-gray-50">
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Update Status</div>
      <div class="grid grid-cols-1 gap-2">
        <select onchange="openStatusModal('${u.id}', '${esc(u.unit_name)}', this.value, '${esc(u.location||'')}', '${esc(u.notes||'')}'); this.value=''" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600" style="min-height:40px;">
          <option value="">Change status to...</option>
          <option value="in_service">In Service</option>
          <option value="out_of_service">Out of Service</option>
          <option value="maintenance">At Shop / Maintenance</option>
          <option value="reserve">Reserve In Service</option>
        </select>
      </div>
    </div>` : ''

  const logHtml = log.length ? `
    <div class="mt-3">
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Status Change Log</div>
      <div class="space-y-1.5">
        ${log.map(entry => {
          const from = STATUS_CFG[entry.previous_status]?.label || entry.previous_status || '—'
          const to   = STATUS_CFG[entry.new_status]?.label || entry.new_status
          return `<div class="text-xs bg-gray-50 rounded-lg px-3 py-2">
            <span class="font-semibold">${esc(from)} → ${esc(to)}</span>
            ${entry.location ? `<span class="text-gray-400 ml-2">📍${esc(entry.location)}</span>` : ''}
            ${entry.finding  ? `<div class="text-gray-500 mt-0.5">${esc(entry.finding)}</div>` : ''}
            <div class="text-gray-400 mt-0.5">${esc(entry.changed_by)} · ${fmtDateTime(entry.created_at)}</div>
          </div>`
        }).join('')}
      </div>
    </div>` : ''

  return `<div>
    <div class="flex items-center gap-3 mb-3">
      <span class="font-bold px-3 py-1.5 rounded-full text-sm ${st.cls}">${st.label}</span>
      ${u.location ? `<span class="text-sm text-gray-600">📍 ${esc(u.location)}</span>` : ''}
    </div>
    ${u.notes ? `<div class="text-sm text-gray-600 mb-3 bg-gray-50 rounded-lg px-3 py-2">📝 ${esc(u.notes)}</div>` : ''}
    <div class="text-xs text-gray-400 mb-3">Last updated ${timeAgo(u.last_updated)}${u.updated_by ? ` by ${esc(u.updated_by)}` : ''}</div>
    ${updateForm}
    ${logHtml}
  </div>`
}

function renderFindingsTab(u, openFindings, isOff) {
  const addBtn = isOff ? `
    <div class="flex gap-2 mb-4">
      <button onclick="openFindingModal('${u.id}','${esc(u.unit_name)}','damage')" class="flex-1 bg-red-700 hover:bg-red-800 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">+ Report Damage</button>
      <button onclick="openFindingModal('${u.id}','${esc(u.unit_name)}','repair_needed')" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">+ Repair Needed</button>
      <button onclick="openFindingModal('${u.id}','${esc(u.unit_name)}','inspection')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">+ Inspection</button>
    </div>` : ''

  const checkBtns = isOff ? `
    <div class="flex gap-2 mb-4">
      <button onclick="openCheckModal('${u.id}','${esc(u.unit_name)}','${esc(u.unit_type)}','daily_check')" class="flex-1 bg-green-700 hover:bg-green-800 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">✓ Daily Check</button>
      <button onclick="openCheckModal('${u.id}','${esc(u.unit_name)}','${esc(u.unit_type)}','weekly_check')" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">✓ Weekly Check</button>
    </div>` : ''

  const list = openFindings.length
    ? openFindings.map(f => {
        const pri = PRI_CFG[f.priority] || PRI_CFG.medium
        const statusBtns = isOff ? `
          <div class="flex gap-1 mt-1.5">
            ${f.status === 'open' ? `<button onclick="updateFindingStatus('${f.id}','in_progress','${u.id}')" class="text-xs px-2 py-1 bg-yellow-100 text-yellow-800 rounded font-semibold hover:bg-yellow-200" style="min-height:0;">Mark In Progress</button>` : ''}
            <button onclick="updateFindingStatus('${f.id}','completed','${u.id}')" class="text-xs px-2 py-1 bg-green-100 text-green-800 rounded font-semibold hover:bg-green-200" style="min-height:0;">Mark Resolved</button>
            <button onclick="updateFindingStatus('${f.id}','cancelled','${u.id}')" class="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded font-semibold hover:bg-gray-200" style="min-height:0;">Cancel</button>
          </div>` : ''
        return `<div class="border rounded-xl px-3 py-2.5 mb-2 ${f.priority === 'critical' ? 'border-red-300 bg-red-50' : 'border-gray-200'}">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap mb-1">
                <span class="text-xs font-bold px-2 py-0.5 rounded-full ${pri.cls}">${pri.label}</span>
                <span class="text-xs text-gray-500 font-semibold">${FTYPE_LABEL[f.finding_type] || f.finding_type}</span>
                <span class="text-xs text-gray-400">${f.status.replace('_',' ')}</span>
              </div>
              <div class="text-sm font-semibold text-gray-800">${esc(f.description)}</div>
              ${f.assigned_to ? `<div class="text-xs text-gray-500 mt-0.5">Assigned: ${esc(f.assigned_to)}</div>` : ''}
              ${f.photos_notes ? `<div class="text-xs text-gray-500 mt-0.5">${esc(f.photos_notes)}</div>` : ''}

            </div>
          </div>

      }).join('')
    : `<div class="text-center py-6 text-gray-400 text-sm">No open findings.</div>`

  return `${addBtn}${checkBtns}${list}`

  const addBtn = isOff ? `
    <button onclick="openScheduleModal('${u.id}','${esc(u.unit_name)}')" class="w-full bg-purple-700 hover:bg-purple-800 text-white text-sm font-bold rounded-xl py-2.5 mb-4 transition" style="min-height:0;">+ Schedule Maintenance</button>` : ''

        <div class="border border-gray-200 rounded-xl px-3 py-2.5 mb-2">
          <div class="text-sm font-semibold text-gray-800 mb-1">${esc(f.description)}</div>
          ${f.scheduled_date ? `<div class="text-xs text-blue-700 font-semibold">📅 Scheduled: ${fmtDate(f.scheduled_date)}</div>` : ''}
          ${f.assigned_to ? `<div class="text-xs text-gray-500">Assigned to: ${esc(f.assigned_to)}</div>` : ''}
          ${f.photos_notes ? `<div class="text-xs text-gray-500 mt-0.5">${esc(f.photos_notes)}</div>` : ''}

          ${isOff ? `<button onclick="updateFindingStatus('${f.id}','completed','${u.id}')" class="mt-1.5 text-xs px-2 py-1 bg-green-100 text-green-800 rounded font-semibold hover:bg-green-200" style="min-height:0;">Mark Completed</button>` : ''}
        </div>`).join('')
    : `<div class="text-center py-6 text-gray-400 text-sm">No scheduled maintenance.</div>`

function renderChecksTab(u, isOff) {
  const allFindings = u.findings || []
  const dailyChecks  = allFindings.filter(f => f.finding_type === 'daily_check').slice(0, 10)
  const weeklyChecks = allFindings.filter(f => f.finding_type === 'weekly_check').slice(0, 5)

  const checkBtns = isOff ? `
    <div class="flex gap-2 mb-4">
      <button onclick="openCheckModal('${u.id}','${esc(u.unit_name)}','${esc(u.unit_type)}','daily_check')" class="flex-1 bg-green-700 hover:bg-green-800 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">✓ Daily Check</button>
      <button onclick="openCheckModal('${u.id}','${esc(u.unit_name)}','${esc(u.unit_type)}','weekly_check')" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white text-xs font-bold rounded-xl py-2 transition" style="min-height:0;">✓ Weekly Check</button>
    </div>` : ''

  function renderCheckList(checks, label) {
    if (!checks.length) return `<div class="text-xs text-gray-400 italic mb-3">No ${label} on record.</div>`
    return checks.map(f => {
      const hasIssues = f.description && f.description.startsWith('ISSUES')
      const statusCls = hasIssues ? 'border-red-200 bg-red-50' : 'border-green-200 bg-green-50'
      const iconCls   = hasIssues ? 'text-red-700' : 'text-green-700'
      const icon      = hasIssues ? '⚠' : '✓'
      const expandId  = `cke-${f.id}`
      return `<div class="border rounded-xl px-3 py-2 mb-2 ${statusCls}">
        <div class="flex items-center justify-between gap-2">
          <div class="flex-1 min-w-0">
            <span class="text-xs font-bold ${iconCls}">${icon} ${hasIssues ? 'ISSUES FOUND' : 'PASS'}</span>
            <span class="text-xs text-gray-500 ml-2">${fmtDateTime(f.created_at)} — ${esc(f.reported_by)}</span>
          </div>
          <button onclick="document.getElementById('${expandId}').classList.toggle('hidden')" class="text-xs text-gray-400 hover:text-gray-600 flex-shrink-0" style="min-height:0;">Details ▾</button>
        </div>
        ${hasIssues ? `<div class="text-xs text-red-700 font-semibold mt-0.5 truncate">${esc(f.description)}</div>` : ''}
        <div id="${expandId}" class="hidden mt-2">
          ${renderCheckData(f.findings_data)}
        </div>
      </div>`
    }).join('')
  }

  return `${checkBtns}
    <div class="mb-1">
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Daily Checks (recent)</div>
      ${renderCheckList(dailyChecks, 'daily checks')}
    </div>
    <div>
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Weekly Checks (recent)</div>
      ${renderCheckList(weeklyChecks, 'weekly checks')}
    </div>`
}

function renderCheckData(fd) {
  if (!fd || !fd.items) return '<span class="text-xs text-gray-400">No detail data</span>'
  return `<table style="width:100%;font-size:11px;border-collapse:collapse;">
    ${fd.items.map(i => `
      <tr style="${!i.pass ? 'background:#fef2f2;' : ''}">
        <td style="padding:3px 8px;border-bottom:1px solid #f3f4f6;color:#374151;">${esc(i.label)}</td>
        <td style="padding:3px 8px;border-bottom:1px solid #f3f4f6;font-weight:${!i.pass ? '700' : 'normal'};color:${!i.pass ? '#dc2626' : '#374151'};">${esc(i.value)}</td>
      </tr>`).join('')}
    ${fd.notes ? `<tr><td colspan="2" style="padding:3px 8px;font-style:italic;color:#6b7280;font-size:11px;">Notes: ${esc(fd.notes)}</td></tr>` : ''}
  </table>`
}

// ── EXPAND / TAB TOGGLE ───────────────────────────────────────────────────────
function toggleExpand(id) {
  expandedId = expandedId === id ? null : id
  if (expandedId && !activeTab[id]) activeTab[id] = 'status'
  renderAll()
}

function setTab(unitId, tab) {
  activeTab[unitId] = tab
  renderAll()
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.add('hidden')
  modalUnitId = null
}

function openStatusModal(id, name, status, location, notes) {
  modalUnitId = id
  document.getElementById('statusModalTitle').textContent = `Update ${name}`
  document.getElementById('ms_status').value   = status
  document.getElementById('ms_location').value = location
  document.getElementById('ms_notes').value    = notes
  document.getElementById('ms_err').classList.add('hidden')
  document.getElementById('statusModal').classList.remove('hidden')
}

async function submitStatusUpdate() {
  const err = document.getElementById('ms_err')
  err.classList.add('hidden')
  try {
    const res = await fetch(`${API}/manage-apparatus`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
      body: JSON.stringify({
        action:   'update_status',
        id:       modalUnitId,
        status:   document.getElementById('ms_status').value,
        location: document.getElementById('ms_location').value.trim() || undefined,
        notes:    document.getElementById('ms_notes').value.trim() || undefined
      })
    })
    const data = await res.json()
    if (!res.ok) { err.textContent = data.error || 'Update failed'; err.classList.remove('hidden'); return }
    closeModal('statusModal')
    await loadApparatus()
  } catch (e) { err.textContent = e.message; err.classList.remove('hidden') }
}

function openFindingModal(id, name, type) {
  modalUnitId = id
  document.getElementById('findingModalTitle').textContent = `Report Finding — ${name}`
  document.getElementById('fm_type').value    = type
  document.getElementById('fm_priority').value = 'medium'
  document.getElementById('fm_desc').value    = ''
  document.getElementById('fm_assigned').value = ''
  document.getElementById('fm_notes').value   = ''
  document.getElementById('fm_err').classList.add('hidden')
  document.getElementById('findingModal').classList.remove('hidden')
  document.getElementById('fm_desc').focus()
}

async function submitFinding() {
  const err = document.getElementById('fm_err')
  err.classList.add('hidden')
  const desc = document.getElementById('fm_desc').value.trim()
  if (!desc) { err.textContent = 'Description required'; err.classList.remove('hidden'); return }
  try {
    const res = await fetch(`${API}/manage-findings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
      body: JSON.stringify({
        action:       'report',
        apparatus_id: modalUnitId,
        finding_type: document.getElementById('fm_type').value,
        description:  desc,
        priority:     document.getElementById('fm_priority').value,
        assigned_to:  document.getElementById('fm_assigned').value.trim() || undefined,
        photos_notes: document.getElementById('fm_notes').value.trim() || undefined
      })
    })
    const data = await res.json()
    if (!res.ok) { err.textContent = data.error || 'Failed'; err.classList.remove('hidden'); return }
    closeModal('findingModal')
    await loadApparatus()
  } catch (e) { err.textContent = e.message; err.classList.remove('hidden') }
}

function openScheduleModal(id, name) {

  document.getElementById('scheduleModalTitle').textContent = `Schedule Maintenance — ${name}`
  document.getElementById('sm_desc').value     = ''
  document.getElementById('sm_date').value     = ''
  document.getElementById('sm_assigned').value = ''
  document.getElementById('sm_notes').value    = ''
  document.getElementById('sm_err').classList.add('hidden')
  document.getElementById('scheduleModal').classList.remove('hidden')
  document.getElementById('sm_desc').focus()
}

async function submitSchedule() {
  const err = document.getElementById('sm_err')
  err.classList.add('hidden')
  const desc = document.getElementById('sm_desc').value.trim()
  if (!desc) { err.textContent = 'Description required'; err.classList.remove('hidden'); return }
  try {
    const res = await fetch(`${API}/manage-findings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
      body: JSON.stringify({
        action:         'report',
        apparatus_id:   modalUnitId,
        finding_type:   'scheduled_maintenance',
        description:    desc,
        priority:       'low',
        scheduled_date: document.getElementById('sm_date').value || undefined,
        assigned_to:    document.getElementById('sm_assigned').value.trim() || undefined,
        photos_notes:   document.getElementById('sm_notes').value.trim() || undefined
      })
    })
    const data = await res.json()
    if (!res.ok) { err.textContent = data.error || 'Failed'; err.classList.remove('hidden'); return }
    closeModal('scheduleModal')
    await loadApparatus()
  } catch (e) { err.textContent = e.message; err.classList.remove('hidden') }
}

async function updateFindingStatus(findingId, status, unitId) {
  try {
    const res = await fetch(`${API}/manage-findings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
      body: JSON.stringify({ action: 'update', id: findingId, status })
    })
    if (!res.ok) { alert('Update failed'); return }
    await loadApparatus()
  } catch (e) { alert(e.message) }
}

// ── CHECK MODAL ───────────────────────────────────────────────────────────────
let currentCheckType = 'daily_check'

function getDailyItems(unitType, unitName) {
  const t = (unitType || '').toLowerCase()
  const n = (unitName || '').toLowerCase()
  let items = [...DAILY_COMMON]
  // Match engine by type name or unit name (E1, E5, etc.)
  if (t.includes('engine') || t.includes('pumper') || /\be\d+\b/.test(n)) {
    items = [...items, ...DAILY_ENGINE]
  } else if (t.includes('tower') || /\bt\d+\b/.test(n)) {
    items = [...items, ...DAILY_TOWER]
  } else if (t.includes('rescue') || /\br\d+\b/.test(n)) {
    items = [...items, ...DAILY_RESCUE]
  }
  return items
}

function openCheckModal(id, name, unitType, checkType) {
  modalUnitId      = id
  currentCheckType = checkType
  const isDaily    = checkType === 'daily_check'
  document.getElementById('checkModalTitle').textContent = `${isDaily ? '✓ Daily Check' : '✓ Weekly Equipment Check'} — ${name}`
  document.getElementById('ck_notes').value  = ''
  document.getElementById('ck_err').classList.add('hidden')

  const items = isDaily ? getDailyItems(unitType, name) : WEEKLY_ITEMS
  const container = document.getElementById('checkItems')
  container.innerHTML = items.map(item => `
    <div id="ck-row-${item.key}" class="border-b border-gray-100 last:border-b-0">
      <div class="flex items-center justify-between gap-3 px-3 py-2.5">
        <label class="text-sm font-medium text-gray-700 flex-1">${esc(item.label)}</label>
        <select id="ck_${item.key}" data-key="${item.key}" data-label="${esc(item.label)}" data-pass='${JSON.stringify(item.pass)}'
          onchange="onCheckItemChange(this)"
          class="border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-600 min-w-[120px]" style="min-height:36px;">
          ${item.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
        </select>
      </div>
      <div id="ck-issue-${item.key}" style="max-height:0;overflow:hidden;transition:max-height 0.28s ease;">
        <div class="px-3 pb-3">
          <textarea id="ck_note_${item.key}" rows="2" maxlength="500" placeholder="Describe the issue..."
            class="w-full border border-red-300 bg-red-50 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none" style="min-height:0;"></textarea>
        </div>
      </div>
    </div>`).join('')

  document.getElementById('checkModal').classList.remove('hidden')
}

function onCheckItemChange(sel) {
  const passValues = JSON.parse(sel.dataset.pass)
  const isPass     = passValues.includes(sel.value)
  const row        = document.getElementById(`ck-row-${sel.dataset.key}`)
  const issueBox   = document.getElementById(`ck-issue-${sel.dataset.key}`)

  if (row) {
    const baseClass = row.className.replace(/\s*bg-red-50/g, '')
    row.className = baseClass + (isPass ? '' : ' bg-red-50')
  }
  sel.className = sel.className.replace(/border-red-400|border-gray-200/g, '') + (isPass ? ' border-gray-200' : ' border-red-400')

  if (issueBox) {
    if (!isPass) {
      issueBox.style.maxHeight = '120px'
      setTimeout(() => { document.getElementById(`ck_note_${sel.dataset.key}`)?.focus() }, 280)
    } else {
      issueBox.style.maxHeight = '0'
      const ta = document.getElementById(`ck_note_${sel.dataset.key}`)
      if (ta) ta.value = ''
    }
  }
}

async function submitCheck() {
  const err  = document.getElementById('ck_err')
  err.classList.add('hidden')

  const allSelects = [...document.querySelectorAll('#checkItems select[data-key]')]
  const items = allSelects.map(sel => ({
    key:   sel.dataset.key,
    label: sel.dataset.label,
    value: sel.value,
    pass:  JSON.parse(sel.dataset.pass).includes(sel.value),
    notes: document.getElementById('ck_note_' + sel.dataset.key)?.value.trim() || null
  }))

  const notes     = document.getElementById('ck_notes').value.trim()
  const hasIssues = items.some(i => !i.pass)

  // Require per-item description for each failed item
  const failedMissingNotes = items.filter(i => !i.pass && !i.notes)
  if (failedMissingNotes.length > 0) {
    err.textContent = `Please describe the issue for: ${failedMissingNotes.map(i => i.label).join(', ')}`
    err.classList.remove('hidden')
    // Expand and focus the first missing textarea
    const firstKey = failedMissingNotes[0].key
    const box = document.getElementById(`ck-issue-${firstKey}`)
    if (box) box.style.maxHeight = '120px'
    setTimeout(() => document.getElementById(`ck_note_${firstKey}`)?.focus(), 50)
    return
  }

  const tour = groupForDate(Date.now())
  const btn  = document.getElementById('ck_submit')
  btn.disabled = true
  btn.textContent = 'Submitting...'

  try {
    const res = await fetch(`${API}/manage-findings`, {
      method:'POST', headers:{'Content-Type':'application/json',...AUTH.getHeaders()},
      body: JSON.stringify({ action:'submit_check', apparatus_id:modalUnitId, check_type:currentCheckType, items, notes:notes||null, has_issues:hasIssues, tour })
    })
    const data = await res.json()
    if (!res.ok) { err.textContent = data.error||'Failed'; err.classList.remove('hidden'); return }
    closeModal('checkModal')
    await loadApparatus()
    setTab(modalUnitId||data.apparatus_id, 'checks')
  } catch(e) { err.textContent = e.message; err.classList.remove('hidden') }
  finally { btn.disabled=false; btn.textContent='Submit Check' }
}

['statusModal','findingModal','repairModal','scheduleModal','checkModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id)
  })
})
