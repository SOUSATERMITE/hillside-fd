<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#b71c1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hillside FD">
  <link rel="manifest" href="/manifest.json">
  <title>Sick Tracking — Hillside FD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    select, button, input { min-height: 44px; }
    nav { padding-top: max(12px, env(safe-area-inset-top)); background: #1a5c2a; }
    nav button, nav a { min-height: 0 !important; }
    #mobileMenu { top: calc(max(12px, env(safe-area-inset-top)) + 44px); background: #1a5c2a; }
    .nav-active { font-weight:700; border-bottom:2px solid rgba(255,255,255,0.85); }
    .nav-mobile-active { background:rgba(255,255,255,0.15) !important; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Auth modal container -->
  <div id="authModal"></div>

  <nav class="text-white px-4 pb-3 flex items-center justify-between shadow-lg sticky top-0 z-50">
    <span class="font-extrabold text-base sm:text-lg tracking-wide whitespace-nowrap">Hillside FD</span>
    <div class="hidden sm:flex items-center gap-3 text-sm font-medium">
      <a href="/"        class="hover:text-green-200 pb-0.5">Dashboard</a>
      <a href="/sick"     class="nav-active pb-0.5">Sick Tracking</a>
      <a href="/recall"   class="hover:text-green-200 pb-0.5">Recall List</a>
      <a href="/docs"     class="hover:text-green-200 pb-0.5">Documents</a>
      <a href="/search"   class="hover:text-green-200 pb-0.5">Search</a>
      <a href="/vacation" class="hover:text-green-200 pb-0.5">Vacation</a>
      <a href="/apparatus" class="hover:text-green-200 pb-0.5">Apparatus</a>
      <a href="/personnel" data-admin-only class="hidden hover:text-green-200 pb-0.5">Personnel</a>
      <a href="/admin"    class="hover:text-green-200 pb-0.5">Admin</a>
    </div>
    <div class="flex items-center gap-2">
      <span id="authSlot" class="flex items-center gap-2"></span>
      <button onclick="toggleMobileMenu()" class="sm:hidden text-white rounded px-1 hover:bg-white hover:bg-opacity-20 transition" style="min-height:0;font-size:22px;line-height:1;background:none;border:none;cursor:pointer;" aria-label="Menu">&#9776;</button>
    </div>
  </nav>
  <div id="menuBackdrop" class="hidden fixed inset-0 z-40" onclick="closeMobileMenu()" style="background:rgba(0,0,0,0.4);"></div>
  <div id="mobileMenu" class="sm:hidden hidden fixed left-0 right-0 z-50 shadow-2xl" style="overflow-y:auto;max-height:calc(100vh - 80px);">
    <a href="/"        onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Dashboard</a>
    <a href="/sick"     onclick="closeMobileMenu()" class="nav-mobile-active flex items-center px-6 text-white font-semibold border-b border-green-900" style="min-height:52px;">Sick Tracking</a>
    <a href="/recall"   onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Recall List</a>
    <a href="/docs"     onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Documents</a>
    <a href="/search"   onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Search</a>
    <a href="/vacation" onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Vacation Requests</a>
    <a href="/apparatus" onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Apparatus</a>
    <a href="/personnel" data-admin-only onclick="closeMobileMenu()" class="hidden flex items-center px-6 text-white font-semibold border-b border-green-900 hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Personnel</a>
    <a href="/admin"    onclick="closeMobileMenu()" class="flex items-center px-6 text-white font-semibold hover:bg-white hover:bg-opacity-10" style="min-height:52px;">Admin</a>
  </div>

  <!-- Error Banner -->
  <div id="errorBanner" class="hidden bg-red-600 text-white text-sm px-4 py-3 text-center font-semibold"></div>

  <!-- Acting Captain Banner -->
  <div id="actingBanner"></div>

  <div class="max-w-5xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-extrabold text-gray-800 mb-6">Sick Tracking</h1>

    <div class="grid grid-cols-1 gap-6">

      <!-- Mark Sick Form -->
      <div class="bg-white rounded-2xl shadow p-5 mb-2">
        <h2 class="font-bold text-gray-800 text-base mb-3 uppercase tracking-wide">Mark Firefighter Sick</h2>
        <div class="flex flex-col gap-3">
          <select id="ffSelect" class="border border-gray-300 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">Select firefighter...</option>
          </select>
          <button onclick="markSick()" class="bg-red-700 hover:bg-red-800 text-white font-bold rounded-xl px-4 py-3 transition">
            Mark Sick
          </button>
          <div id="markSickResult" class="text-sm font-semibold text-center"></div>
        </div>
      </div>

      <!-- Currently Sick List -->
      <div>
        <h2 class="font-bold text-gray-700 uppercase tracking-wide text-sm mb-3">
          Currently Sick <span id="sickCount" class="ml-1 bg-red-600 text-white text-xs rounded-full px-2 py-0.5">0</span>
        </h2>
        <div id="currentlySickList">
          <div class="text-gray-400 text-sm text-center py-8">Loading...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    const API = '/.netlify/functions'
    let allFirefighters = []

    function showError(msg) {
      const b = document.getElementById('errorBanner')
      b.textContent = msg
      b.classList.remove('hidden')
      setTimeout(() => b.classList.add('hidden'), 6000)
    }

    function formatEastern(isoString) {
      if (!isoString) return '—'
      return new Date(isoString).toLocaleString('en-US', {
        timeZone: 'America/New_York',
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      })
    }

    async function loadData() {
      try {
        const [ffRes, sickRes] = await Promise.all([
          fetch(`${API}/get-firefighters`),
          fetch(`${API}/get-sick`)
        ])
        if (!ffRes.ok) throw new Error('Failed to load firefighters')
        if (!sickRes.ok) throw new Error('Failed to load sick list')

        allFirefighters = await ffRes.json()
        const sickData = await sickRes.json()

        renderFFDropdown()
        renderCurrentlySick(sickData.currently_sick || [])
      } catch (e) {
        showError('Error loading data: ' + e.message)
      }
    }

    function renderFFDropdown() {
      const ffSel = document.getElementById('ffSelect')
      const groups = {}
      for (const f of allFirefighters) {
        if (!groups[f.group_number]) groups[f.group_number] = []
        groups[f.group_number].push(f)
      }
      let html = '<option value="">Select firefighter...</option>'
      for (const g of Object.keys(groups).sort()) {
        html += `<optgroup label="Group ${g}">`
        for (const f of groups[g].sort((a,b) => a.name.localeCompare(b.name))) {
          html += `<option value="${f.id}">${f.name} — Group ${f.group_number} — ${f.rank}</option>`
        }
        html += '</optgroup>'
      }
      ffSel.innerHTML = html
    }

    function renderCurrentlySick(entries) {
      const container = document.getElementById('currentlySickList')
      document.getElementById('sickCount').textContent = entries.length

      if (entries.length === 0) {
        container.innerHTML = '<div class="text-gray-400 text-sm text-center py-8 bg-white rounded-xl border border-gray-200">No one currently sick</div>'
        return
      }

      container.innerHTML = entries.map(e => {
        const ff = e.firefighters || {}
        return `
          <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-3">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-bold text-lg text-gray-900">${ff.name || '—'}</div>
                <div class="text-sm text-gray-500">Group ${ff.group_number} — ${ff.rank}</div>
                <div class="text-xs text-red-700 mt-1">Sick since: ${formatEastern(e.marked_sick_date)}</div>
                <div class="text-xs text-gray-500">Marked by: ${e.marked_sick_by || '—'}</div>
              </div>
              <span class="bg-red-600 text-white text-xs font-bold px-2 py-1 rounded">SICK</span>
            </div>
            <button onclick="clearSick('${e.id}')" class="mt-3 w-full bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
              Clear — RTD
            </button>
          </div>
        `
      }).join('')
    }

    async function markSick() {
      const ffId = document.getElementById('ffSelect').value
      const resultEl = document.getElementById('markSickResult')

      if (!ffId) { resultEl.textContent = 'Please select a firefighter.'; resultEl.className = 'text-sm font-semibold text-center text-orange-600'; return }

      if (!AUTH.isOfficer()) {
        AUTH.showLoginModal(() => markSick())
        return
      }

      resultEl.textContent = 'Saving...'
      resultEl.className = 'text-sm font-semibold text-center text-gray-500'

      try {
        const res = await fetch(`${API}/mark-sick`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
          body: JSON.stringify({ firefighter_id: ffId })
        })
        const data = await res.json()
        if (!res.ok) {
          resultEl.textContent = data.error || 'Error marking sick.'
          resultEl.className = 'text-sm font-semibold text-center text-red-600'
          return
        }
        resultEl.textContent = 'Marked sick successfully.'
        resultEl.className = 'text-sm font-semibold text-center text-green-600'
        document.getElementById('ffSelect').value = ''
        await loadData()
      } catch (e) {
        resultEl.textContent = 'Network error: ' + e.message
        resultEl.className = 'text-sm font-semibold text-center text-red-600'
      }
    }

    async function clearSick(sickLogId) {
      if (!AUTH.isOfficer()) {
        AUTH.showLoginModal(() => clearSick(sickLogId))
        return
      }

      try {
        const res = await fetch(`${API}/clear-sick`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...AUTH.getHeaders() },
          body: JSON.stringify({ sick_log_id: sickLogId })
        })
        const data = await res.json()
        if (!res.ok) { showError(data.error || 'Error clearing sick status.'); return }
        await loadData()
      } catch (e) {
        showError('Network error: ' + e.message)
      }
    }

    async function loadActingBanner() {
      try {
        await AUTH.loadOfficers()
        const acting = AUTH.getActingOfficers()
        const el = document.getElementById('actingBanner')
        if (!el) return
        if (!acting.length) { el.innerHTML = ''; return }
        const names = acting.map(o => {
          const m = o.display_name.match(/^Acting: (.+?) \(/)
          return m ? m[1] : o.display_name
        }).join(', ')
        el.innerHTML = `
          <div class="bg-amber-50 border-b border-amber-200 text-amber-800 text-xs font-semibold px-4 py-2 text-center">
            ⚡ Acting officer${acting.length > 1 ? 's' : ''} on duty this shift: ${names}
          </div>`
      } catch {}
    }

    loadData()
    loadActingBanner()
    setInterval(loadData, 60000)

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(console.error))
    }
  </script>
</body>
</html>
